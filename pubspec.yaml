name: flutter_edge_ai
description: Aplikasi Flutter dengan Fitur AI Edge Computing - Tugas Kuliah
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  fl_chart: ^0.68.0
  image_picker: ^1.0.7
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.1
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
